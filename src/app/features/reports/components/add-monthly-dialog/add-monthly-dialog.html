<mat-dialog-content class="default-modal w-11/12 md:w-1/3">
    <h2 mat-dialog-title class="font-bold text-lg">ADD NEW MONTHLY PAYER</h2>

    <div class="flex flex-col mt-4">
        <form [formGroup]="entryForm" (ngSubmit)="onSubmit()" class="space-y-2">
            <mat-form-field class="w-full" appearance="outline">
                <mat-label>Plate Number</mat-label>
                <input matInput formControlName="plateNumber" placeholder="Plate Number">
            </mat-form-field>
            <mat-form-field class="w-full" appearance="outline">
                <mat-label>Vehicle Type</mat-label>
                <mat-select formControlName="vehicleType">
                    <mat-option value="CAR">CAR</mat-option>
                    <mat-option value="MOTORCYCLE">MOTORCYCLE</mat-option>
                    <mat-option value="TRUCK">TRUCK</mat-option>
                </mat-select>
            </mat-form-field>
            <mat-form-field class="w-full" appearance="outline">
                <mat-label>Enter a date range</mat-label>
                <mat-date-range-input [formGroup]="range" [rangePicker]="picker">
                    <input matStartDate formControlName="start" placeholder="Start date">
                    <input matEndDate formControlName="end" placeholder="End date">
                </mat-date-range-input>
                <mat-hint>MM/DD/YYYY - MM/DD/YYYY</mat-hint>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-date-range-picker #picker></mat-date-range-picker>

                @if (range.controls.start.hasError('matStartDateInvalid')) {
                    <mat-error>Invalid start date</mat-error>
                }

                @if (range.controls.end.hasError('matEndDateInvalid')) {
                    <mat-error>Invalid end date</mat-error>
                }
            </mat-form-field>

            <div class="flex gap-4 justify-end mt-4" mat-dialog-actions>
                <app-button variant="neutral" (click)="cancel()">Cancel</app-button>
                <app-button variant="primary" (click)="confirmExit()">Add New</app-button>
            </div>
        </form>
    </div>
</mat-dialog-content>
